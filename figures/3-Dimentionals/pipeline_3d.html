<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End-to-End RCO Validation Pipeline - 3D Visualization</title>
    <style>
        body { margin: 0; background-color: #00050a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .label {
            position: absolute;
            color: #ffffff;
            background: rgba(0, 20, 40, 0.8);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #00d2ff;
            pointer-events: none;
            font-size: 14px;
            transform: translate(-50%, -100%);
            display: none;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            z-index: 10;
        }
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00d2ff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
            pointer-events: none;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #88aacc;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">END-TO-END RCO VALIDATION PIPELINE</div>
    <div id="label" class="label"></div>
    <div class="controls-hint">Orbit: Left Click | Pan: Right Click | Zoom: Scroll</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        const nodes = [];
        const lightStreams = [];

        const NODE_DATA = [
            { id: 'd_t', title: 'Telemetry Input (D_t)', formula: 'Raw Event Data Stream', x: -16, y: 0, z: 0, color: 0x4488ff },
            { id: 'b_t', title: 'Stream Canonicalization', formula: 'B_t = S(D_t)', x: -12, y: 0, z: 0, color: 0x44aaff },
            { id: 'h_t', title: 'Cryptographic Hashing', formula: 'H_t = H(B_t)', x: -8, y: 0, z: 0, color: 0x44ccff },
            { id: 'l_t', title: 'Lineage Chain', formula: 'L_t = H(H_t || L_{t-1})', x: -4, y: 0, z: 0, color: 0x00d2ff },
            { id: 'm_t', title: 'State Binding', formula: 'M_t = H(S_t) || L_t', x: 0, y: 0, z: 0, color: 0x00ffff },
            
            // Validators cluster
            { id: 'v1', title: 'Validator 1', formula: 'Independent Signer', x: 4, y: 2, z: 2, color: 0x8888ff, type: 'validator' },
            { id: 'v2', title: 'Validator 2', formula: 'Independent Signer', x: 4, y: 1, z: -2, color: 0x8888ff, type: 'validator' },
            { id: 'v3', title: 'Validator 3', formula: 'Independent Signer', x: 4, y: -1, z: 2, color: 0x8888ff, type: 'validator' },
            { id: 'v4', title: 'Validator 4', formula: 'Independent Signer', x: 4, y: -2, z: -2, color: 0x8888ff, type: 'validator' },
            { id: 'v5', title: 'Validator 5', formula: 'Independent Signer', x: 4, y: 0, z: 0, color: 0x8888ff, type: 'validator' },

            { id: 'sigma', title: 'Signature Aggregation', formula: 'Σ_t = Aggregate(Shares)', x: 8, y: 0, z: 0, color: 0x00ffcc },
            { id: 'engine', title: 'Verification Engine', formula: 'Verify(Σ_t, M_t, PubKeys)', x: 12, y: 0, z: 0, color: 0x00ff88 },
            
            { id: 'accept', title: 'ACCEPT', formula: 'Integrity Verified', x: 16, y: 1.5, z: 0, color: 0x00ff44, final: true },
            { id: 'reject', title: 'REJECT', formula: 'Integrity Failure', x: 16, y: -1.5, z: 0, color: 0xff4444, final: true }
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00d2ff, 1.5, 50);
            pointLight.position.set(0, 10, 10);
            scene.add(pointLight);

            // Create Nodes
            NODE_DATA.forEach(data => {
                const geometry = data.final ? new THREE.SphereGeometry(0.6, 32, 32) : new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const material = new THREE.MeshPhongMaterial({
                    color: data.color,
                    emissive: data.color,
                    emissiveIntensity: 0.5,
                    shininess: 100,
                    transparent: true,
                    opacity: 0.9
                });

                const node = new THREE.Mesh(geometry, material);
                node.position.set(data.x, data.y, data.z);
                node.userData = data;
                scene.add(node);
                nodes.push(node);

                // Add glass frame for processors
                if (!data.final && data.type !== 'validator') {
                    const frameGeom = new THREE.BoxGeometry(1.2, 1.2, 1.2);
                    const frameMat = new THREE.MeshPhongMaterial({
                        color: data.color,
                        transparent: true,
                        opacity: 0.1,
                        wireframe: true
                    });
                    const frame = new THREE.Mesh(frameGeom, frameMat);
                    frame.position.copy(node.position);
                    scene.add(frame);
                }
            });

            // Create Connections & Streams
            createConnections();

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
        }

        function createConnections() {
            const connect = (startId, endId, color, count = 1) => {
                const start = nodes.find(n => n.userData.id === startId).position;
                const end = nodes.find(n => n.userData.id === endId).position;

                // Static line
                const points = [start, end];
                const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
                const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.2 });
                const line = new THREE.Line(lineGeom, lineMat);
                scene.add(line);

                // Animated streams
                for (let i = 0; i < count; i++) {
                    const particleGeom = new THREE.SphereGeometry(0.05, 8, 8);
                    const particleMat = new THREE.MeshBasicMaterial({ color: color });
                    const particle = new THREE.Mesh(particleGeom, particleMat);
                    
                    scene.add(particle);
                    lightStreams.push({
                        mesh: particle,
                        start: start.clone(),
                        end: end.clone(),
                        progress: Math.random(),
                        speed: 0.005 + Math.random() * 0.01
                    });
                }
            };

            // Main Pipeline
            connect('d_t', 'b_t', 0x4488ff, 3);
            connect('b_t', 'h_t', 0x44aaff, 3);
            connect('h_t', 'l_t', 0x44ccff, 3);
            connect('l_t', 'm_t', 0x00d2ff, 3);

            // Fan out to Validators
            ['v1', 'v2', 'v3', 'v4', 'v5'].forEach(v => {
                connect('m_t', v, 0x8888ff, 2);
                connect(v, 'sigma', 0x8888ff, 2);
            });

            connect('sigma', 'engine', 0x00ffcc, 3);
            connect('engine', 'accept', 0x00ff44, 2);
            connect('engine', 'reject', 0xff4444, 2);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);

            const label = document.getElementById('label');
            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = `<strong>${data.title}</strong><br><small>${data.formula}</small>`;
                document.body.style.cursor = 'pointer';
            } else {
                label.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            lightStreams.forEach(stream => {
                stream.progress += stream.speed;
                if (stream.progress > 1) stream.progress = 0;
                stream.mesh.position.lerpVectors(stream.start, stream.end, stream.progress);
            });

            nodes.forEach(node => {
                if (!node.userData.final) {
                    node.rotation.x += 0.01;
                    node.rotation.y += 0.01;
                }
                const time = Date.now() * 0.001;
                node.position.y += Math.sin(time + node.position.x) * 0.002;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
