<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDK Integration Across Architectures - RCO 3D Visualization</title>
    <style>
        body { margin: 0; background-color: #000c18; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            color: #00d2ff;
            pointer-events: none;
        }
        .title { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .zone-labels {
            position: absolute;
            top: 80px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #88aacc;
            font-size: 14px;
            letter-spacing: 1.5px;
            pointer-events: none;
        }
        .label-box {
            position: absolute;
            background: rgba(0, 10, 20, 0.9);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #00d2ff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -100%);
            z-index: 10;
        }
        .info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #88aacc;
            font-size: 12px;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="ui"><div class="title">RCO SDK: MULTI-ARCHITECTURE INTEGRATION</div></div>
    <div class="zone-labels">
        <span>MICROSERVICES</span>
        <span>STREAMING / EVENTS</span>
        <span>GATEWAY / PROXY</span>
    </div>
    <div id="label" class="label-box"></div>
    <div class="info">SDK abstracts protocol complexity, managing deterministic hashing and lineage tracking for the application layer.</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        const nodes = [];
        const lightStreams = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 35);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambient = new THREE.AmbientLight(0x404040, 2.5);
            scene.add(ambient);
            const point = new THREE.PointLight(0xffffff, 2, 120);
            point.position.set(10, 30, 20);
            scene.add(point);

            buildScene();
            animate();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('mousemove', onMouseMove);
        }

        function createBoxNode(id, x, y, z, color, label, formula, hasSDK=true) {
            const group = new THREE.Group();
            group.position.set(x, y, z);
            
            const geom = new THREE.BoxGeometry(2.5, 1.5, 1);
            const mat = new THREE.MeshPhongMaterial({ color: 0x223344, emissive: 0x223344, emissiveIntensity: 0.1 });
            const mesh = new THREE.Mesh(geom, mat);
            group.add(mesh);
            mesh.userData = { id, label, formula };
            nodes.push(mesh);

            if (hasSDK) {
                const sdkGeom = new THREE.BoxGeometry(1, 0.6, 1.1);
                const sdkMat = new THREE.MeshPhongMaterial({ color: 0x00d2ff, emissive: 0x00d2ff, emissiveIntensity: 0.5 });
                const sdk = new THREE.Mesh(sdkGeom, sdkMat);
                sdk.position.set(0.6, 0, 0);
                group.add(sdk);
                sdk.userData = { id: id+'_sdk', label: 'RCO SDK ('+label+')', formula: 'Protocol Abstraction Layer' };
                nodes.push(sdk);
            }

            scene.add(group);
            return group;
        }

        function buildScene() {
            // Shared Central API
            const apiNode = createBoxNode('api', 0, -5, 0, 0x5588ff, 'RCO API & Fabric', 'Consensus & Validation Layer', false);

            // ZONE 1: Microservices (Left)
            const s1 = createBoxNode('s1', -15, 8, 2, 0xadb5bd, 'Service A', 'Backend Logic');
            const s2 = createBoxNode('s2', -15, 4, 0, 0xadb5bd, 'Service B', 'Backend Logic');
            const s3 = createBoxNode('s3', -15, 0, -2, 0xadb5bd, 'Service C', 'Backend Logic');

            // ZONE 2: Streaming (Center)
            const prod = createBoxNode('prod', 0, 9, 0, 0xadb5bd, 'Event Producer', 'Kafka/Pulsar Source', false);
            const processor = createBoxNode('proc', 0, 4, 0, 0xadb5bd, 'Stream Processor', 'Real-time Validation');

            // ZONE 3: Gateway (Right)
            const clients = createBoxNode('clients', 15, 9, 0, 0xadb5bd, 'Client Devices', 'External Traffic', false);
            const gateway = createBoxNode('gate', 15, 4, 0, 0xadb5bd, 'Gateway / Proxy', 'Centralized Security');

            // Connections
            [s1, s2, s3, processor, gateway].forEach(n => setupStream(n, apiNode, 0x00d2ff));
            setupStream(prod, processor, 0x88aacc);
            setupStream(clients, gateway, 0x88aacc);
        }

        function setupStream(from, to, color) {
            for (let i = 0; i < 4; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshBasicMaterial({ color }));
                scene.add(p);
                lightStreams.push({
                    mesh: p,
                    start: from.position.clone(),
                    end: to.position.clone(),
                    progress: Math.random(),
                    speed: 0.003 + Math.random() * 0.005
                });
            }
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            const label = document.getElementById('label');
            if (intersects.length > 0) {
                const d = intersects[0].object.userData;
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = `<strong>${d.label}</strong><br><small>${d.formula}</small>`;
                document.body.style.cursor = 'pointer';
            } else {
                label.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            lightStreams.forEach(s => {
                s.progress += s.speed;
                if (s.progress > 1) s.progress = 0;
                s.mesh.position.lerpVectors(s.start, s.end, s.progress);
            });
            nodes.forEach(n => {
                if (n.userData.id.includes('sdk')) {
                    n.position.x = 0.6 + Math.sin(Date.now()*0.005)*0.1;
                }
            });
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
