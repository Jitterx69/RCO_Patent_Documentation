<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCO API Interaction Flow & Proof Generation - 3D Visualization</title>
    <style>
        body { margin: 0; background-color: #000c18; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            color: #00d2ff;
            pointer-events: none;
        }
        .title { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .label {
            position: absolute;
            background: rgba(0, 10, 20, 0.9);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #00d2ff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -100%);
            z-index: 10;
        }
        .controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        .btn {
            background: rgba(0, 40, 80, 0.5);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover { background: #00d2ff; color: #000; }
        .btn.error { border-color: #e53e3e; color: #e53e3e; }
        .btn.error:hover { background: #e53e3e; color: #fff; }
    </style>
</head>
<body>
    <div class="ui"><div class="title">RCO API INTERACTION FLOW & PROOF GENERATION</div></div>
    <div id="label" class="label"></div>
    <div class="controls">
        <button class="btn" onclick="triggerAPI(true)">SIMULATE VALID REQUEST</button>
        <button class="btn error" onclick="triggerAPI(false)">SIMULATE INVALID REQUEST</button>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        const nodes = [];
        const lightStreams = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambient = new THREE.AmbientLight(0x404040, 2.5);
            scene.add(ambient);
            const point = new THREE.PointLight(0xffffff, 2, 100);
            point.position.set(10, 20, 10);
            scene.add(point);

            buildAPI();
            animate();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('mousemove', onMouseMove);
        }

        function createNode(id, x, y, z, color, label, formula) {
            const geom = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const mat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.2 });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, y, z);
            mesh.userData = { id, label, formula };
            scene.add(mesh);
            nodes.push(mesh);
            return mesh;
        }

        function buildAPI() {
            // Client
            const n_cli = createNode('cli', -18, 0, 0, 0xadb5bd, 'Client / Application', 'Identity Verified via TLS');
            
            // Endpoint
            const n_api = createNode('api', -12, 0, 0, 0x00d2ff, 'API Endpoint (/v1/ingest)', 'Accepts: {data, state, lineage}');

            // Pipeline
            const n_can = createNode('can', -6, 0, 0, 0x5588ff, 'Canonicalization', 'DETERMINISM: Same bits, same time');
            const n_has = createNode('has', -2, 0, 0, 0x5588ff, 'Hashing', 'SHA-3/Blake3 Binding');
            const n_lin = createNode('lin', 2, 0, 0, 0x5588ff, 'Lineage Binding', 'L_t = H(H_t || L_{t-1})');
            const n_sta = createNode('sta', 6, 0, 0, 0x5588ff, 'State Binding', 'M_t = H(S_t) || L_t');

            // Validators
            const v_ring = [];
            for(let i=0; i<5; i++) {
                const angle = (i/5) * Math.PI * 2;
                const v = createNode('v'+i, 12 + Math.cos(angle)*3, 0, Math.sin(angle)*3, 0x00ffff, 'Validator '+i, 'Independent Verifier');
                v_ring.push(v);
            }

            // Aggregator
            const n_agg = createNode('agg', 18, 0, 0, 0x38a169, 'Verification & Aggregation', 'Σ_t Aggregate Proof');

            // Connections
            setupStream(n_cli, n_api, 0xadb5bd);
            setupStream(n_api, n_can, 0x00d2ff);
            setupStream(n_can, n_has, 0x5588ff);
            setupStream(n_has, n_lin, 0x5588ff);
            setupStream(n_lin, n_sta, 0x5588ff);
            
            v_ring.forEach(v => {
                setupStream(n_sta, v, 0x00ffff);
                setupStream(v, n_agg, 0x00ffff);
            });
            
            // Return flow
            setupReturnStream(n_agg, n_cli, 0x38a169);
        }

        function setupStream(from, to, color) {
            for(let i=0; i<4; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color }));
                scene.add(p);
                lightStreams.push({
                    mesh: p,
                    start: from.position,
                    end: to.position,
                    progress: Math.random(),
                    speed: 0.005 + Math.random() * 0.005,
                    type: 'forward'
                });
            }
        }

        function setupReturnStream(from, to, color) {
            const curve = new THREE.QuadraticBezierCurve3(
                from.position,
                new THREE.Vector3(0, -10, 0),
                to.position
            );
            for(let i=0; i<5; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshBasicMaterial({ color }));
                scene.add(p);
                lightStreams.push({
                    mesh: p,
                    curve,
                    progress: Math.random(),
                    speed: 0.003,
                    type: 'return'
                });
            }
        }

        function triggerAPI(isValid) {
            const color = isValid ? 0x38a169 : 0xe53e3e;
            lightStreams.forEach(s => {
                if (s.type === 'return') {
                    s.mesh.material.color.setHex(color);
                }
            });
            
            // Pulse the client node
            const cli = nodes.find(n => n.userData.id === 'cli');
            cli.material.emissiveIntensity = 2;
            setTimeout(() => cli.material.emissiveIntensity = 0.3, 300);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);
            const label = document.getElementById('label');
            if (intersects.length > 0) {
                const d = intersects[0].object.userData;
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = `<strong>${d.label}</strong><br><small>${d.formula}</small>`;
                document.body.style.cursor = 'pointer';
            } else {
                label.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            lightStreams.forEach(s => {
                s.progress += s.speed;
                if (s.progress > 1) s.progress = 0;
                
                if (s.curve) {
                    s.mesh.position.copy(s.curve.getPoint(s.progress));
                } else {
                    s.mesh.position.lerpVectors(s.start, s.end, s.progress);
                }
            });
            nodes.forEach(n => n.rotation.y += 0.01);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
